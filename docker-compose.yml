services:
  dev:
    container_name: double-hexagon-dev
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    ports:
      - "5173:5173"
      - "8000:8000"
    environment:
      # Git — fine-grained PAT with read-only repo access
      - GH_TOKEN=${GH_TOKEN:-}
      # AWS — read-only credentials (supports temporary session tokens)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    tty: true
